services:
  # BASE DE DATOS: PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: app10-db
    restart: always
    environment:
      - POSTGRES_DB=unibot
      - POSTGRES_USER=unibot
      - POSTGRES_PASSWORD=unibot1234
    volumes:
      - app10-db-data:/var/lib/postgresql/data
    networks:
      - nginx-proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  # BACKEND: Django + Gunicorn
  backend:
    build: ./backend
    container_name: app10-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - VIRTUAL_HOST=api.app10.academia.ar
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=api.app10.academia.ar
      - LETSENCRYPT_EMAIL=admin@academia.ar
      - DJANGO_ALLOWED_HOSTS=api.app10.academia.ar,localhost,127.0.0.1
      - DATABASE_URL=postgres://unibot:unibot1234@db:5432/unibot
      - POSTGRES_DB=unibot
      - POSTGRES_USER=unibot
      - POSTGRES_PASSWORD=unibot1234
      - DB_HOST=db
      - SECRET_KEY=unibot-production-s3cr3t-k3y-2026
      - DEBUG=0
      - CORS_ALLOW_ALL=0
    volumes:
      - media_data:/code/media
    networks:
      - nginx-proxy
    deploy:
      resources:
        limits:
          memory: 384m

  # FRONTEND: React compilado + Nginx
  frontend:
    build: ./frontend
    container_name: app10-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - VIRTUAL_HOST=app10.academia.ar
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=app10.academia.ar
      - LETSENCRYPT_EMAIL=admin@academia.ar
    networks:
      - nginx-proxy
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  app10-db-data:
  media_data:

networks:
  nginx-proxy:
    external: true