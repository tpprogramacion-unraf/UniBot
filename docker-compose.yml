version: '3.8'

services:
  # BASE DE DATOS: PostgreSQL
  db:
    image: postgres:16
    container_name: app10-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - app10-db-data:/var/lib/postgresql/data
    networks:
      - nginx-proxy
    deploy:
      resources:
        limits:
          memory: 256m

  # BACKEND: Django
  backend:
    build: ./backend
    image: app10-backend-v2
    container_name: app10-backend
    restart: always
    depends_on:
      - db
    env_file: .env
    environment:
      - VIRTUAL_HOST=api.app10.academia.ar
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=api.app10.academia.ar
      - LETSENCRYPT_EMAIL=admin@academia.ar
      - DJANGO_ALLOWED_HOSTS=api.app10.academia.ar,localhost,127.0.0.1
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - nginx-proxy
    deploy:
      resources:
        limits:
          memory: 384m

  # FRONTEND: React + Nginx
  frontend:
    build: ./frontend
    image: app10-frontend-v2
    container_name: app10-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - VIRTUAL_HOST=app10.academia.ar
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=app10.academia.ar
      - LETSENCRYPT_EMAIL=admin@academia.ar
    networks:
      - nginx-proxy
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  app10-db-data:

networks:
  nginx-proxy:
    external: true