services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    working_dir: /code
    volumes:
      - ./backend:/code
      - media_data:/code/media
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations core &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"

  celery:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    working_dir: /code
    volumes:
      - ./backend:/code
      - media_data:/code/media
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost/api
    volumes:
      - ./frontend:/app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_data:/code/media
    depends_on:
      - backend
      - frontend

volumes:
  redis_data:
  media_data: